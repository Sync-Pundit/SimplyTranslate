<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimplyTranslate — Preferences</title>
  <meta name="description" content="Configure SimplyTranslate." />
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v=20260619.2" />
</head>
<body>
  <main class="wrap wrap-narrow">
    <header class="site-header">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">
          <img src="{{ url_for('static', filename='favicon128x128.png') }}?v=20260619.2" alt="" />
        </div>
        <div>
          <h1 class="title">Preferences</h1>
          <p class="subtitle">Tune the translator without changing the mission.</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="/" class="link-pill">← Back to Translator</a>
      </div>
    </header>

    <section class="settings-card">
      <header><strong>Interface settings</strong></header>
      <div class="content">
        <form action="/prefs" method="POST" class="settings-form">
          <label class="setting-row">
            <span>
              <span class="setting-title">Use text fields for language selection</span><br />
              <span class="setting-description">Show free-text inputs instead of dropdowns.</span>
            </span>
            <span class="switch-control">
              <input type="checkbox" id="use_text_fields" name="use_text_fields" {% if use_text_fields %}checked{% endif %} />
            </span>
          </label>

          <label class="setting-row">
            <span>
              <span class="setting-title">Enable text-to-speech</span><br />
              <span class="setting-description">Generate audio for input and output when supported.</span>
            </span>
            <span class="switch-control">
              <input type="checkbox" id="tts_enabled" name="tts_enabled" {% if tts_enabled %}checked{% endif %} />
            </span>
          </label>

          <div class="settings-actions">
            <button type="submit" class="btn primary">Save preferences</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
